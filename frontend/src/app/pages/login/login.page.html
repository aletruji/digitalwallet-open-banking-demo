<app-page-header
  [leftLabel]="'Digitales Portemonnaie'"
  [showAuthButton]="false"
  [showReload]="false"
></app-page-header>

<main class="max-w-3xl mx-auto px-6 py-10">

  <!-- login card -->
  <div class="bg-white rounded-2xl shadow p-8">
    <div class="text-xl font-semibold text-gray-900 text-center">
      Willkommen
    </div>

    <div class="mt-2 text-gray-600 text-center">
      Melden Sie sich an, um Zugriff auf Ihre Konten zu erhalten
    </div>

    <!-- login -->
    <div class="mt-8 flex justify-center">
      <button
        class="w-full sm:w-80 px-6 py-3 rounded-xl bg-[#8b1c2d] text-white font-semibold hover:opacity-90 disabled:opacity-50"
        (click)="login()"
        [disabled]="loading"
      >
        {{ loading ? 'Anmelden...' : 'Anmelden' }}
      </button>
    </div>

    <!-- spinner if !data -->

    <div *ngIf="loading" class="flex justify-center py-6">
      <div class="h-10 w-10 rounded-full border-4 border-gray-200 border-t-[#8b1c2d] animate-spin"></div>
    </div>

    <!-- error -->
    <div *ngIf="error" class="mt-2 text-red-700 font-semibold text-center">
      {{ error }}
    </div>
  </div>
</main>
